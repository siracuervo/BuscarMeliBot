name: Buscar Onix en Mercado Libre

on:
  schedule:
    # Corre cada 30 minutos (UTC). Ajustá el cron a gusto.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write   # necesario para poder commitear seen_ids.json

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ml_bot.py

      - name: Guardar historial de publicaciones vistas
        run: |
          git config user.name "ml-onix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "Actualiza historial de publicaciones vistas"
          git push
